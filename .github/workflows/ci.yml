name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: mandrel
          POSTGRES_PASSWORD: mandrel
          POSTGRES_DB: mandrel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mandrel"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      MANDREL_DATABASE_URL: postgresql+asyncpg://mandrel:mandrel@localhost:5432/mandrel

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check mandrel/ tests/

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run tests (unit + integration)
        run: uv run pytest -v -m "" --tb=short

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false
