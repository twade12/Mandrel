# Tier-0 authored rules: oscillators, RF, traces, ground planes, EMC.
rules:
  - id: osc-crystal-close-to-mcu
    category: oscillator
    severity: must
    statement: >-
      Place the crystal/oscillator as close as possible to the MCU's XIN/XOUT
      pins with the shortest symmetric traces; keep load capacitors right at the
      crystal pins.
    constraints:
      max_distance_mm: 5.0
    applicability:
      part_classes: [crystal, oscillator]
      net_classes: [clock]
    rationale: Long clock traces add capacitance/inductance and radiate.
    tags: [oscillator, clock]

  - id: osc-guard-ground
    category: oscillator
    severity: should
    statement: >-
      Surround the crystal and its traces with a local ground pour/guard ring
      tied to the ground plane, and keep noisy signals away from the oscillator.
    applicability:
      part_classes: [crystal, oscillator]
      net_classes: [clock]
    rationale: Guarding contains clock emissions and rejects coupled noise.
    tags: [oscillator, emc, ground]

  - id: rf-50ohm-controlled-impedance
    category: rf
    severity: must
    statement: >-
      Route RF/antenna traces as controlled-impedance (typically 50 ohm) lines,
      as short and straight as possible, with continuous reference ground.
    applicability:
      part_classes: [antenna]
      net_classes: [rf]
    rationale: Impedance discontinuities cause reflections and loss.
    tags: [rf, impedance]

  - id: rf-antenna-keepout
    category: rf
    severity: must
    statement: >-
      Keep all copper (including ground pour and the ground plane) out of the
      antenna keep-out region, and place the antenna at a board edge/corner.
    constraints:
      antenna_keepout: true
    applicability:
      part_classes: [antenna]
      net_classes: [rf]
    rationale: Nearby copper detunes the antenna and kills range.
    tags: [rf, keepout]

  - id: trace-width-by-current
    category: trace
    severity: should
    statement: >-
      Size power traces for their current (e.g. >= 0.3 mm for ~0.5 A on 1 oz
      outer copper); use the widest practical width for VBUS/3V3/GND feeds.
    constraints:
      min_power_trace_mm: 0.3
    applicability:
      net_classes: [power]
    rationale: Undersized power traces drop voltage and heat up.
    tags: [trace, power, thermal]

  - id: ground-solid-plane
    category: ground_plane
    severity: must
    statement: >-
      Use one solid, continuous ground plane layer; avoid splitting it under
      signal traces so every signal has an unbroken return path directly beneath.
    constraints:
      solid_plane: true
    applicability:
      net_classes: [ground]
    rationale: A continuous plane gives low-impedance, low-EMI return paths.
    tags: [ground, emc, return-path]

  - id: ground-stitching-vias
    category: ground_plane
    severity: should
    statement: >-
      Stitch ground pours and planes together with vias around the board edge
      and near high-speed/clock parts to keep plane potential uniform.
    applicability:
      net_classes: [ground]
    rationale: Stitching suppresses plane resonances and edge radiation.
    tags: [ground, via, emc]

  - id: ethernet-bobsmith-termination
    category: signal_integrity
    severity: should
    statement: >-
      Terminate Ethernet magnetics center taps with Bob Smith termination — 75 Ω per pair
      to a chassis-ground plane through a high-voltage ~1000 pF capacitor.
    constraints:
      bobsmith_resistor_ohm: 75
      bobsmith_cap_pf: 1000
    applicability:
      part_classes: [connector, ic]
      net_classes: [signal, ground]
    rationale: >-
      Provides common-mode impedance match and reduces common-mode emissions on unused
      pairs/center taps (Microchip ENT-AN0098; Semtech).
    tags: [ethernet, bob-smith, emc]
  - id: ethernet-protection-phy-side
    category: signal_integrity
    severity: should
    statement: >-
      Place Ethernet surge/TVS protection on the PHY side of the magnetics, across each
      pair; rely on the transformer isolation (≥1500 Vrms) for line-side common-mode surges.
    applicability:
      part_classes: [connector, ic]
      net_classes: [signal]
    rationale: >-
      The transformer attenuates primary surge current; line-side TVS causes more problems
      than it solves (Semtech Ethernet Protection Methodology).
    tags: [ethernet, surge, tvs]
  - id: clock-driver-one-frequency
    category: signal_integrity
    severity: should
    statement: >-
      Pass only one clock frequency through any single clock-driver/buffer package; do not
      share a package between different-frequency clocks.
    applicability:
      part_classes: [oscillator, ic]
      net_classes: [clock]
    rationale: >-
      Sharing a package couples clocks, producing excess jitter and crosstalk (ADI MT-031).
    tags: [clock, jitter, crosstalk]
  - id: rf-trace-no-plane-gap
    category: signal_integrity
    severity: must
    statement: >-
      Never route an RF feed or high-speed line over a gap/void in its reference plane;
      keep a solid plane under the entire run to the chip ground pad.
    applicability:
      part_classes: [antenna, ic]
      net_classes: [rf, signal]
    rationale: >-
      A plane gap breaks the return path, detuning RF and radiating noise (Nordic; PCB Artists).
    tags: [rf, return-path, plane]