<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="640" height="128">
  <defs>
    <style>
      .trace { stroke: #22D3EE; stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .via { fill: #22D3EE; }
      .via-inner { fill: #0F172A; }
      .bg { fill: #0F172A; }
      .wordmark {
        font-family: 'Courier New', 'Courier', monospace;
        font-weight: 700;
        fill: #F8FAFC;
        font-size: 30px;
        letter-spacing: 5px;
      }
      .tagline {
        font-family: 'Courier New', 'Courier', monospace;
        fill: #475569;
        font-size: 8.5px;
        letter-spacing: 5.5px;
      }
    </style>
  </defs>

  <!-- Icon background -->
  <rect x="0" y="0" width="64" height="64" rx="10" class="bg"/>

  <!-- PCB-trace M
       Corners: TL(13,11) TR(51,11) — peak: (32,27) — BL(13,53) BR(51,53)
       Traces are 4px wide with 45-degree diagonals (true PCB routing style)
  -->

  <!-- Left leg (vertical) -->
  <line x1="13" y1="11" x2="13" y2="53" class="trace" stroke-width="4"/>
  <!-- Left diagonal to peak -->
  <line x1="13" y1="11" x2="32" y2="27" class="trace" stroke-width="4"/>
  <!-- Right diagonal to peak -->
  <line x1="51" y1="11" x2="32" y2="27" class="trace" stroke-width="4"/>
  <!-- Right leg (vertical) -->
  <line x1="51" y1="11" x2="51" y2="53" class="trace" stroke-width="4"/>

  <!-- Vias (through-hole pads at each joint) -->
  <!-- Top-left -->
  <circle cx="13" cy="11" r="5.5" class="via"/>
  <circle cx="13" cy="11" r="2.5" class="via-inner"/>
  <!-- Top-right -->
  <circle cx="51" cy="11" r="5.5" class="via"/>
  <circle cx="51" cy="11" r="2.5" class="via-inner"/>
  <!-- Peak (larger — it's a 3-way junction) -->
  <circle cx="32" cy="27" r="7" class="via"/>
  <circle cx="32" cy="27" r="3" class="via-inner"/>
  <!-- Bottom-left -->
  <circle cx="13" cy="53" r="5.5" class="via"/>
  <circle cx="13" cy="53" r="2.5" class="via-inner"/>
  <!-- Bottom-right -->
  <circle cx="51" cy="53" r="5.5" class="via"/>
  <circle cx="51" cy="53" r="2.5" class="via-inner"/>

  <!-- Wordmark -->
  <text x="80" y="40" class="wordmark">MANDREL</text>
  <!-- Tagline -->
  <text x="81" y="55" class="tagline">ELECTRONICS ORCHESTRATION</text>
</svg>
